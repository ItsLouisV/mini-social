name: mini_social
description: "MiniSocial — Ứng dụng mạng xã hội mini Flutter + Supabase"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.0.0

  # Backend
  supabase_flutter: ^2.5.0

  # Environment
  flutter_dotenv: ^5.1.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  flutter_image_compress: ^2.3.0

  # Utilities
  timeago: ^3.6.1
  uuid: ^4.4.0
  path_provider: ^2.1.3
  shared_preferences: ^2.3.2

  # UI
  infinite_scroll_pagination: ^4.0.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  photo_view: ^0.15.0
  video_player: ^2.11.1
  async: ^2.13.1

  # Audio
  audioplayers: ^6.1.0
  record: ^6.0.0
  livekit_client: ^2.7.0
  permission_handler: ^12.0.1
  font_awesome_flutter: ^11.0.0
  flutter_slidable: ^4.0.3
  flutter_secure_storage: ^10.3.0


  scrollable_positioned_list: ^0.3.8

  # Offline Storage
  objectbox: ^4.0.3
  objectbox_flutter_libs: ^4.0.3
  connectivity_plus: ^7.0.0
  custom_pop_up_menu: ^1.2.4
  google_fonts: ^8.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.11
  objectbox_generator: ^4.0.3
  custom_lint: ^0.7.6
  riverpod_lint: ^2.3.10

flutter:
  uses-material-design: true
  assets:
    - .env
    - .env.development
    - .env.staging
    - .env.production
    - assets/images/
    - assets/images/wallpapers/
    - assets/sounds/

  # fonts: (download Inter from https://fonts.google.com and place in assets/fonts/)
